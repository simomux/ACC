# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: CMake on a single platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-latest

    env:
      PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM toolchain & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib build-essential

      # Cache the Pico SDK to speed up build.
      - name: Cache Pico SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ env.PICO_SDK_PATH }}
          key: pico-sdk-${{ hashFiles('.github/workflows/cmake-single-platform.yml') }}

      # Clone only specific submodules to reduce clone time and cache size.
      - name: Clone Pico SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git "$PICO_SDK_PATH"
          cd "$PICO_SDK_PATH" && git submodule update --init --depth 1 lib/tinyusb lib/cyw43-driver lib/lwip

      - name: Configure CMake
        run: cmake -B build -DPICO_BOARD=pico_w

      - name: Build
        run: cmake --build build --parallel $(nproc)
